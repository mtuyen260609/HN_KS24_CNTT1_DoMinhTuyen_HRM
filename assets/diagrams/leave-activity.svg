<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 12; ry: 12; }
      .diamond { fill: #ffffff; stroke: #374151; stroke-width: 2; }
      .label { font-family: Arial, sans-serif; font-size: 16px; fill: #111827; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #374151; }
    </style>
  </defs>

  <text x="30" y="32" class="title">Activity Diagram - Đơn nghỉ phép</text>

  <circle cx="120" cy="110" r="18" fill="#111827"/>
  <line x1="120" y1="128" x2="120" y2="150" class="arrow"/>

  <rect x="60" y="150" width="120" height="56" class="box"/>
  <text x="120" y="184" class="label">Nhập đơn phép</text>
  <line x1="120" y1="206" x2="120" y2="240" class="arrow"/>

  <polygon points="120,250 180,300 120,350 60,300" class="diamond"/>
  <text x="120" y="305" class="label">Hợp lệ?</text>

  <line x1="180" y1="300" x2="300" y2="300" class="arrow"/>
  <rect x="300" y="270" width="150" height="56" class="box"/>
  <text x="375" y="304" class="label">Lưu PENDING</text>

  <line x1="450" y1="298" x2="560" y2="298" class="arrow"/>
  <rect x="560" y="270" width="170" height="56" class="box"/>
  <text x="645" y="304" class="label">Gửi thông báo Manager</text>

  <line x1="730" y1="298" x2="840" y2="298" class="arrow"/>
  <rect x="840" y="270" width="160" height="56" class="box"/>
  <text x="920" y="304" class="label">Manager xem đơn</text>

  <line x1="920" y1="326" x2="920" y2="360" class="arrow"/>
  <polygon points="920,370 980,420 920,470 860,420" class="diamond"/>
  <text x="920" y="425" class="label">Duyệt?</text>

  <line x1="980" y1="420" x2="1110" y2="420" class="arrow"/>
  <rect x="1040" y="390" width="120" height="56" class="box"/>
  <text x="1100" y="424" class="label">APPROVED</text>

  <line x1="920" y1="470" x2="920" y2="520" class="arrow"/>
  <rect x="860" y="520" width="160" height="56" class="box"/>
  <text x="940" y="554" class="label">REJECTED + lý do</text>

  <line x1="940" y1="576" x2="940" y2="600" class="arrow"/>
  <text x="944" y="612" class="small">Kết thúc quy trình</text>

  <line x1="60" y1="300" x2="0" y2="300" class="arrow"/>
  <text x="260" y="380" class="small">Nếu không hợp lệ, quay lại chỉnh sửa đơn</text>
</svg>
