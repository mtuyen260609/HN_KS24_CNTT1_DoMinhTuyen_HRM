  <rect x="720" y="440" width="150" height="50" class="usecase" rx="25" ry="25"/>
  <text x="795" y="471" class="label">Phân quyền</text>
  <rect x="720" y="510" width="150" height="50" class="usecase" rx="25" ry="25"/>
  <text x="795" y="541" class="label">Cấu hình hệ thống</text>
