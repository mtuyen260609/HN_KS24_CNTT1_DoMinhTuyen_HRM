<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HRM PRO</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="login-screen">
    <div class="login-card">
        <h1 class="login-title">HRM PRO</h1>
        <p class="login-subtitle">Hệ thống quản trị nhân sự thế hệ mới</p>

        <div th:if="${param.error}" class="login-error">
            <i class="ph-light ph-warning-circle" style="vertical-align: middle; margin-right: 6px; font-size: 16px;"></i>
            Sai tài khoản hoặc mật khẩu. Vui lòng thử lại.
        </div>

        <form th:action="@{/session/start}" method="post">
            <div class="input-group">
                <label>Email doanh nghiệp</label>
                <input type="email" name="email" placeholder="employee@demo.local" required autocomplete="email">
            </div>
            <div class="input-group" style="margin-bottom: 28px;">
                <label>Mật khẩu</label>
                <input type="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 48px;">
                <span>ĐĂNG NHẬP</span>
                <i class="ph-light ph-arrow-right"></i>
            </button>
        </form>

        <div class="demo-credentials">
            <h4>Tài khoản Demo</h4>
            <ul>
                <li><strong>Nhân viên:</strong> employee@demo.local / 123456</li>
                <li><strong>Quản lý:</strong> manager@demo.local / 123456</li>
                <li><strong>Quản trị HR:</strong> hr@demo.local / 123456</li>
            </ul>
        </div>
    </div>
</body>
</html>
