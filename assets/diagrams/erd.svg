<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="860" viewBox="0 0 1500 860">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#374151"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 10; ry: 10; }
      .hdr { fill: #e5e7eb; stroke: #111827; stroke-width: 2; }
      .tbl { font-family: Arial, sans-serif; font-size: 15px; fill: #111827; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #374151; }
      .rel { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow4); }
    </style>
  </defs>

  <text x="30" y="32" class="title">ERD - HRM</text>

  <rect x="40" y="90" width="250" height="190" class="box"/>
  <rect x="40" y="90" width="250" height="36" class="hdr"/>
  <text x="165" y="114" class="tbl" text-anchor="middle" font-weight="700">DEPARTMENT</text>
  <text x="58" y="145" class="small">id PK</text>
  <text x="58" y="168" class="small">name UK</text>
  <text x="58" y="191" class="small">description</text>
  <text x="58" y="214" class="small">manager_id FK</text>

  <rect x="370" y="70" width="290" height="250" class="box"/>
  <rect x="370" y="70" width="290" height="36" class="hdr"/>
  <text x="515" y="94" class="tbl" text-anchor="middle" font-weight="700">EMPLOYEE</text>
  <text x="388" y="128" class="small">id PK</text>
  <text x="388" y="151" class="small">employee_code UK</text>
  <text x="388" y="174" class="small">first_name, last_name</text>
  <text x="388" y="197" class="small">email UK, phone, cccd UK</text>
  <text x="388" y="220" class="small">department_id FK</text>
  <text x="388" y="243" class="small">position_id FK</text>
  <text x="388" y="266" class="small">status, hire_date</text>

  <rect x="760" y="70" width="250" height="170" class="box"/>
  <rect x="760" y="70" width="250" height="36" class="hdr"/>
  <text x="885" y="94" class="tbl" text-anchor="middle" font-weight="700">ACCOUNT</text>
  <text x="778" y="128" class="small">id PK</text>
  <text x="778" y="151" class="small">username UK</text>
  <text x="778" y="174" class="small">password</text>
  <text x="778" y="197" class="small">employee_id FK</text>

  <rect x="1110" y="70" width="250" height="170" class="box"/>
  <rect x="1110" y="70" width="250" height="36" class="hdr"/>
  <text x="1235" y="94" class="tbl" text-anchor="middle" font-weight="700">ROLE</text>
  <text x="1128" y="128" class="small">id PK</text>
  <text x="1128" y="151" class="small">name UK</text>

  <rect x="760" y="290" width="250" height="170" class="box"/>
  <rect x="760" y="290" width="250" height="36" class="hdr"/>
  <text x="885" y="314" class="tbl" text-anchor="middle" font-weight="700">ATTENDANCE</text>
  <text x="778" y="348" class="small">id PK</text>
  <text x="778" y="371" class="small">employee_id FK</text>
  <text x="778" y="394" class="small">date</text>
  <text x="778" y="417" class="small">check_in_time, check_out_time</text>
  <text x="778" y="440" class="small">status, working_hours</text>

  <rect x="40" y="350" width="250" height="170" class="box"/>
  <rect x="40" y="350" width="250" height="36" class="hdr"/>
  <text x="165" y="374" class="tbl" text-anchor="middle" font-weight="700">LEAVE_REQUEST</text>
  <text x="58" y="408" class="small">id PK</text>
  <text x="58" y="431" class="small">employee_id FK</text>
  <text x="58" y="454" class="small">leave_type, from_date, to_date</text>
  <text x="58" y="477" class="small">reason, status, reject_reason</text>

  <rect x="40" y="580" width="250" height="160" class="box"/>
  <rect x="40" y="580" width="250" height="36" class="hdr"/>
  <text x="165" y="604" class="tbl" text-anchor="middle" font-weight="700">NOTIFICATION</text>
  <text x="58" y="638" class="small">id PK</text>
  <text x="58" y="661" class="small">employee_id FK</text>
  <text x="58" y="684" class="small">title, content, is_read</text>
  <text x="58" y="707" class="small">created_at</text>

  <line x1="290" y1="180" x2="370" y2="180" class="rel"/>
  <text x="300" y="168" class="small">contains</text>

  <line x1="660" y1="210" x2="760" y2="135" class="rel"/>
  <text x="680" y="156" class="small">has</text>

  <line x1="1010" y1="135" x2="1110" y2="135" class="rel"/>
  <text x="1030" y="123" class="small">assigned to</text>

  <line x1="885" y1="240" x2="885" y2="290" class="rel"/>
  <text x="898" y="272" class="small">registers</text>

  <line x1="515" y1="320" x2="165" y2="350" class="rel"/>
  <text x="335" y="314" class="small">requests</text>

  <line x1="165" y1="520" x2="165" y2="580" class="rel"/>
  <text x="178" y="558" class="small">receives</text>
</svg>
